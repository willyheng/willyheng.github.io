<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willy Heng</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .tagline {
            font-size: 1.1rem;
            color: #8b949e;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .links {
            display: flex;
            gap: 2rem;
            justify-content: center;
        }

        .links a {
            color: #8b949e;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #e6edf3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Willy Heng</h1>
        <p class="tagline">Finance × Code</p>
        <div class="links">
            <a href="https://www.linkedin.com/in/willy-heng-cfa-53067a20/" target="_blank" rel="noopener">LinkedIn</a>
            <a href="https://github.com/willyheng" target="_blank" rel="noopener">GitHub</a>
        </div>
    </div>
</body>
</html>
